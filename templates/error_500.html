<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur serveur - CyberConfiance</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-container {
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 8rem;
            font-weight: bold;
            color: #ef4444;
            margin: 0;
            line-height: 1;
        }
        h2 {
            font-size: 2rem;
            margin: 1rem 0;
            color: #1f2937;
        }
        p {
            color: #6b7280;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .cta-button {
            display: inline-block;
            padding: 1rem 2rem;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .cta-button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>500</h1>
        <h2>Erreur Interne</h2>
        <p>
            Une erreur critique est survenue sur le serveur. Nos équipes ont été notifiées.
        </p>
        <a href="/" class="cta-button">Retour à l'accueil</a>
    </div>
</body>
</html>
